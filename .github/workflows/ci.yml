name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.21", "1.22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - run: go vet ./...

      - run: go test -race -coverprofile=coverage.out ./...

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-go${{ matrix.go }}
          path: coverage.out
